# harness CI/CD — GHCR へのイメージ push と Tailscale 経由デプロイ
#
# フロー:
#   1. ci-checks    : Biome lint + TypeScript type check
#   2. build-and-push: web / worker の Docker イメージを GHCR に push
#   3. deploy        : Tailscale でサーバーに接続し、docker compose pull + restart
#
# 事前設定:
#   - GitHub Secrets:
#       TS_OAUTH_CLIENT_ID  … Tailscale OAuth client ID
#       TS_OAUTH_SECRET     … Tailscale OAuth secret
#       DEPLOY_HOST         … instance の MagicDNS 名（例: hub.tailXXXX.ts.net）
#       DEPLOY_USER         … SSH ユーザー名
#       DEPLOY_PATH         … instance 上の harness リポジトリのパス
#       DEPLOY_KEY          … appleboy/scp-action・ssh-action 用の SSH 秘密鍵
#   - Tailscale ACL: tag:ci から instance への SSH を許可
#   - instance 側: `sudo tailscale up --ssh` で Tailscale SSH を有効化

name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: babcs2035/harness

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Setup mise
        uses: jdx/mise-action@main
        with:
          install: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Format & Lint Check with Biome
        run: pnpm biome ci .

      - name: Run Type Check
        run: pnpm run typecheck

  build-and-push:
    name: Build & Push Docker Images
    needs: ci-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Setup mise
        uses: jdx/mise-action@main
        with:
          install: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@master

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@master
        with:
          context: .
          push: true
          platforms: linux/arm64
          file: web/Dockerfile
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@master
        with:
          context: .
          push: true
          platforms: linux/arm64
          file: worker/Dockerfile
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}-worker:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Connect to Tailscale
        uses: tailscale/github-action@main
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Prepare instance directories for SCP overwrite
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            # 過去の docker compose up が prompts/・agent/ を bind mount 元として
            # root 所有で自動作成したままだと、後続の SCP 転送が Permission denied
            # になるため、SCP 実行ユーザーに所有者を揃えておく。
            mkdir -p prompts agent
            docker run --rm -v "$(pwd)/prompts:/p" -v "$(pwd)/agent:/a" alpine \
              chown -R "$(id -u):$(id -g)" /p /a

      - name: Deploy compose file and runtime assets via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          target: ${{ secrets.DEPLOY_PATH }}
          # prompts/ と agent/ は worker に :ro マウントされる実行時アセットのため、
          # docker-compose.yml と併せて毎回転送し instance 側を最新化する。
          source: "docker-compose.yml,prompts,agent"

      - name: Pull image and restart via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            cd ${{ secrets.DEPLOY_PATH }}
            # web/worker はコンテナ内 uid 1000（node）で動くため、bind mount 側の所有者を揃える。
            # data/ が非 root ユーザー所有のままだと DEPLOY_USER から配下に mkdir できない
            # ケースがあるため、mkdir と chown を両方 Docker 経由（root で動く）で行う。
            docker run --rm -v "$(pwd)/data:/data" alpine sh -c \
              "mkdir -p /data/digests /data/increments /data/jobs /data/claude-config && chown -R 1000:1000 /data"
            # SSH_KEY がファイルとして存在しない状態で up すると、Docker が bind mount 元を
            # 空ディレクトリとして自動作成してしまい worker の SSH 接続が壊れるため、事前に検査する。
            set -a; [ -f .env ] && . ./.env; set +a
            SSH_KEY_PATH="${HARNESS_SSH_KEY:-secrets/ssh_key}"
            if [ ! -f "$SSH_KEY_PATH" ]; then
              echo "SSH 鍵ファイルが見つかりません（ファイルとして未配置、または誤ってディレクトリ化しています）: $SSH_KEY_PATH" >&2
              exit 1
            fi
            # worker はコンテナ内 uid 1000（node）で :ro マウントを読むため、
            # 鍵ファイルの所有者が root のままだと Permission denied になる。所有者だけ揃える
            # （パーミッションビットは SSH クライアントが要求する 600 のまま変更しない）。
            SSH_KEY_DIR="$(cd "$(dirname "$SSH_KEY_PATH")" && pwd)"
            docker run --rm -v "$SSH_KEY_DIR:/k" alpine chown 1000:1000 "/k/$(basename "$SSH_KEY_PATH")"
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            for i in $(seq 1 20); do
              if curl -sf "http://127.0.0.1:${WEB_PORT:-3000}/harness/api/health" > /dev/null; then
                echo "health check ok"
                exit 0
              fi
              sleep 5
            done
            echo "health check failed"
            docker compose ps
            curl -v "http://127.0.0.1:${WEB_PORT:-3000}/harness/api/health" || true
            docker compose logs --tail=200
            exit 1
