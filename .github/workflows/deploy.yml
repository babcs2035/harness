# harness CI/CD — GHCR へのイメージ push と Tailscale 経由デプロイ
#
# フロー:
#   1. ci-checks    : Biome lint + TypeScript type check
#   2. build-and-push: web / worker の Docker イメージを GHCR に push
#   3. deploy        : Tailscale でサーバーに接続し、docker compose pull + restart
#
# 事前設定:
#   - GitHub Secrets:
#       TS_OAUTH_CLIENT_ID  … Tailscale OAuth client ID
#       TS_OAUTH_SECRET     … Tailscale OAuth secret
#       DEPLOY_HOST         … instance の MagicDNS 名（例: hub.tailXXXX.ts.net）
#       DEPLOY_USER         … SSH ユーザー名
#       DEPLOY_PATH         … instance 上の harness リポジトリのパス
#       DEPLOY_KEY          … appleboy/scp-action・ssh-action 用の SSH 秘密鍵
#   - Tailscale ACL: tag:ci から instance への SSH を許可
#   - instance 側: `sudo tailscale up --ssh` で Tailscale SSH を有効化

name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: babcs2035/harness

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Setup mise
        uses: jdx/mise-action@main
        with:
          install: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Format & Lint Check with Biome
        run: pnpm biome ci .

      - name: Run Type Check
        run: pnpm run typecheck

  build-and-push:
    name: Build & Push Docker Images
    needs: ci-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Setup mise
        uses: jdx/mise-action@main
        with:
          install: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@master

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@master
        with:
          context: .
          push: true
          platforms: linux/arm64
          file: web/Dockerfile
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@master
        with:
          context: .
          push: true
          platforms: linux/arm64
          file: worker/Dockerfile
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}-worker:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Connect to Tailscale
        uses: tailscale/github-action@main
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy compose file via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          target: ${{ secrets.DEPLOY_PATH }}
          source: "docker-compose.yml"

      - name: Pull image and restart via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            cd ${{ secrets.DEPLOY_PATH }}
            mkdir -p data/digests data/increments data/jobs data/claude-config
            # web/worker はコンテナ内 uid 1000（node）で動くため、bind mount 側の所有者を揃える。
            # ホストの sudo 権限に依存しないよう Docker 経由（root で動く）で chown する。
            docker run --rm -v "$(pwd)/data:/data" alpine chown -R 1000:1000 /data
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            for i in $(seq 1 10); do
              if curl -sf "http://127.0.0.1:${WEB_PORT:-3000}/harness/api/health" > /dev/null; then
                echo "health check ok"
                exit 0
              fi
              sleep 3
            done
            echo "health check failed"
            docker compose logs --tail=100
            exit 1
